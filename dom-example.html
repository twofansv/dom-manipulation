<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping list example</title>
    <style>
      li {
        margin-bottom: 10px;
      }

      li button {
        font-size: 12px;
        margin-left: 20px;
        color: #666;
      }
    </style>
  </head>

  <body>

    <h1>My shopping list</h1>

    <form>
      <label for="item">Enter a new item:</label>
      <input type="text" name="item" id="item">
      <button>Add items</button>
    </form>

    <ul>

    </ul>

    <script>
      const items = document.querySelector('ul');
      const inputItems = document.querySelector('input');
      const addItem = document.querySelector('button');

      addItem.addEventListener('click', event => {
      
        event.preventDefault();

        const data = inputItems.value;
        inputItems.value = "";

        const listItems = document.createElement('li');
        const itemName = document.createElement('span');
        const rmvItem = document.createElement('button');

        itemName.textContent = data;
        listItems.appendChild(itemName);
        listItems.appendChild(rmvItem);

        
        rmvItem.textContent = 'DELETE';

        items.appendChild(listItems);

        rmvItem.addEventListener('click', () => items.removeChild(listItems));

        inputItems.focus();

      });
      



    </script>
  </body>
</html>
